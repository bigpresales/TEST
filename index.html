<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krankenhaus Self Check-In mit Smooth Print</title>
    <style>
        body {
            background: url('Health.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 100%;
            max-width: 600px;
        }
        .logo {
            max-width: 600px;
            margin-bottom: 20px;
        }
        input {
            display: block;
            width: 90%;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #1965E1;
            color: white;
            cursor: pointer;
            margin: 5px;
        }
        #printLink {
            display: none;
            margin-top: 10px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.0/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <div class="container">
        <img src="Bluebar.jpg" alt="Logo" class="logo">
        <h1>Brother Solutions</h1>
        <h2>Krankenhaus Self Check-In mit Smooth Print</h2>
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="lastname" placeholder="Nachname" required>
        <input type="text" id="company" placeholder="Firma" required>
        <input type="email" id="email" placeholder="E-Mail" required>
        <input type="text" id="height" placeholder="Größe (cm)" required>
        <button onclick="previewLink()">Preview Link</button>
        <button onclick="sendToPrint()">Send to Print</button>
        <a id="printLink" href="#" target="_blank">Open Smooth Print</a>
    </div>

    <script>
        function previewLink() {
            const name = document.getElementById('name').value;
            const lastname = document.getElementById('lastname').value;
            const company = document.getElementById('company').value;
            const email = document.getElementById('email').value;
            const height = document.getElementById('height').value;

            const barcode_qr = `${name};${lastname};${company};${email};${height}`;
            const url = `brotherwebprint://print?filename=patient.lbx&size=295.bin&text_name=${name}&text_lastname=${lastname}&text_company=${company}&text_email=${email}&text_height=${height}&barcode_qr=${barcode_qr}`;

            // Display the URL for preview
            alert(`Preview Link: ${url}`);
        }

        function sendToPrint() {
            const name = document.getElementById('name').value;
            const lastname = document.getElementById('lastname').value;
            const company = document.getElementById('company').value;
            const email = document.getElementById('email').value;
            const height = document.getElementById('height').value;

            const barcode_qr = `${name};${lastname};${company};${email};${height}`;
            const url = `brotherwebprint://print?filename=patient.lbx&size=295.bin&text_name=${name}&text_lastname=${lastname}&text_company=${company}&text_email=${email}&text_height=${height}&barcode_qr=${barcode_qr}`;
            		
			
            // Debugging: Log the URL to the console
            console.log(`Generated URL: ${url}`);

            // Set the href attribute of the print link and display it
            const printLink = document.getElementById('printLink');
            printLink.href = url;
            printLink.style.display = 'block';


            // Trigger the Smooth Print app
            window.location.href = url;

            // Refresh input page
            location.reload();
        }
    </script>
</body>
</html>
